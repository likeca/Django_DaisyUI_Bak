- name: Add nignx APT signing key
  apt_key:
    url: https://nginx.org/keys/nginx_signing.key
    state: present

- name: Add Nginx deb to /etc/apt/sources.list repository
  apt_repository:
    repo: "deb https://nginx.org/packages/ubuntu/ {{ ubuntu_code_name}} nginx"
    state: present

- name: Add Nginx deb-src to /etc/apt/sources.list repository
  apt_repository:
    repo: "deb-src https://nginx.org/packages/ubuntu/ {{ ubuntu_code_name}} nginx"
    state: present

- name: APT Update
  apt:
    update_cache: yes
    upgrade: dist

- name: Install latest version nginx
  apt:
    name: nginx
    state: latest
    update_cache: yes

- name: Copy nginx.conf file to {{ ansible_hostname }} /etc/ngnix/nginx.conf
  template:
    src: nginx.conf
    dest: "/etc/nginx/nginx.conf"

- name: Start nginx
  service:
      name: nginx
      enabled: yes
      state: reloaded

