- name: Add nignx APT signing key
  apt_key:
    url:  https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL deb to /etc/apt/sources.list repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt/ {{ ubuntu_code_name}}-pgdg main"
    state: present

- name: APT Update
  apt:
    update_cache: yes

- name: Upgrade all packages to the latest version
  apt:
    name: "*"
    state: latest

- name: Update all packages to the latest dist version
  apt:
    upgrade: dist

- name: Install latest version PostgreSQL packages
  apt:
    pkg:
      - postgresql-12
      # - libpq-dev
      # - binutils
      # - libproj-dev
      # - gdal-bin
      - postgis
    state: present

- name: start PostgreSQL
  service:
      name: postgresql
      enabled: yes
      state: started

- name: Remove postgres user password
  shell: passwd -d postgres

- name: Remove useless packages from the cache
  apt:
    autoclean: yes

- name: Remove dependencies that are no longer required
  apt:
    autoremove: yes