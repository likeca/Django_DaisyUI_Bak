- name: Remove useless packages from the cache
  apt:
    autoclean: yes

- name: Remove dependencies that are no longer required
  apt:
    autoremove: yes

- name: Remove root user password
  shell: passwd -d root

- name: Remove {{ ansible_user }} user password
  shell: passwd -d {{ ansible_user }}
