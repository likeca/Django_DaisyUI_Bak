- name: APT update & upgrade
  apt:
    update_cache: yes
    upgrade: dist

- name: Install apt packages
  apt:
    name: "{{ packages }}"
  vars:
    packages:
      - curl
      - git
      - gnupg
      - zip
      - ca-certificates
      - net-tools
      - vim

- name: Set America/Toronto Local Timezone
  timezone:
    name: America/Toronto

- name: Copy hostname file to {{ ansible_hostname }} /etc/hostname
  template:
    src: hostname
    dest: /etc/hostname

- name: Copy .profile file to {{ ansible_hostname }} /home/{{ ansible_user }}/.profile
  become_user: "{{ ansible_user }}"
  copy:
    src: "files/.profile"
    dest: "/home/{{ ansible_user }}/.profile"

- name: Copy hosts file to {{ ansible_hostname }} /etc/hosts
  template:
    src: hosts
    dest: /etc/hosts

- name: Copy authorized_keys file to {{ ansible_hostname }} /home/{{ ansible_user }}/.ssh/authorized_keys
  copy:
    src: "files/authorized_keys"
    dest: "/home/{{ ansible_user }}/.ssh/authorized_keys"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0600

