# Perquisite
# ssh-keygen -t rsa -b 2048
# Github: Add id_rsa.pub in "Settings > Deploy keys"


- name: Install apt packages
  apt:
    name: "{{ packages }}"
  vars:
    packages:
      - python3
      - python3-venv
      - python3-pip
      - daphne # For django asgi ans wsgi
      - gettext # Translation

- name: Git clone source code
  become_user: "{{ ansible_user }}"
  git:
    repo: "git@github.com:{{ git_username }}/{{ git_repository }}.git"
    dest: /home/{{ ansible_user }}/{{ project_directory }}
    accept_hostkey: yes

- name: Create Python3 venv in /home/{{ ansible_user }}/{{ project_directory }}/
  become_user: "{{ ansible_user }}"
  command: /usr/bin/python3 -m venv /home/{{ ansible_user }}/{{ project_directory }}/.venv

- name: pip install -r requirements/production.txt
  become_user: "{{ ansible_user }}"
  pip:
    requirements: /home/{{ ansible_user }}/{{ project_directory }}/requirements/production.txt
    virtualenv: "/home/{{ ansible_user }}/{{ project_directory }}/.venv"

- name: Copy local.env to settings/local.env
  become_user: "{{ ansible_user }}"
  template:
    src: "local.env"
    dest: "/home/{{ ansible_user }}/{{ project_directory }}/{{ django_project_name }}/settings/local.env"
    mode: 0600

- name: Create /home/{{ ansible_user }}/{{ project_directory }}/logs/ directory
  file:
    path: /home/{{ ansible_user }}/{{ project_directory }}/logs
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Create /home/{{ ansible_user }}/{{ project_directory }}/database/ directory
  file:
    path: /home/{{ ansible_user }}/{{ project_directory }}/database
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0700

