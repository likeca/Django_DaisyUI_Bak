# Config Nginx for Django
- name: Create /usr/share/nginx/html/static/ for Django
  file:
    path: /usr/share/nginx/html/static/
    state: directory
    owner: "{{ ansible_user }}"
    group: "nginx"
    mode: 0755

- name: Create /usr/share/nginx/html/media/ for Django
  file:
    path: /usr/share/nginx/html/media/
    state: directory
    owner: "{{ ansible_user }}"
    group: "nginx"
    mode: 0755

# daphne services
- name: Create /var/log/daphne/ for daphne
  file:
    path: /var/log/daphne/
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Deploy /etc/systemd/system/daphne.service
  template:
    src: daphne.service
    dest: /etc/systemd/system/daphne.service

- name: Start daphne
  systemd:
    name: daphne
    enabled: yes
    state: restarted
    daemon_reload: yes

# Update nginx.conf
- name: Copy nginx.conf to /etc/nginx/nginx.conf
  template:
    src: "nginx.conf"
    dest: "/etc/nginx/nginx.conf"

# Update django.conf
- name: Copy nginx.conf to /etc/nginx/conf.d/django.conf
  template:
    src: "django.conf"
    dest: "/etc/nginx/conf.d/django.conf"

- name: Start nginx
  service:
    name: nginx
    enabled: yes
    state: reloaded

